  <link rel="manifest" href="/site.webmanifest">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/diagram.css">
  
  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "Secure AI Code Execution",
    "description": "How to safely execute AI-generated code in isolated Dynamic Worker sandboxes with Codemode.",
    "step": [
      {"@type": "HowToStep", "name": "AI Generates Code", "text": "Agent generates JavaScript code via Codemode"},
      {"@type": "HowToStep", "name": "Dynamic Worker Created", "text": "Isolated V8 isolate starts in milliseconds"},
      {"@type": "HowToStep", "name": "Network Blocked", "text": "globalOutbound: null blocks all network access"},
      {"@type": "HowToStep", "name": "Tools via RPC", "text": "Sandboxed code calls tools through Workers RPC"}
    ],
    "isPartOf": {
      "@type": "WebSite",
      "name": "Cloudflare AI Security (Unofficial Demo)",
      "url": "https://ai-security.automatic-demo.com/"
    },
    "disclaimer": "Unofficial community demo for educational purposes only. Not affiliated with or endorsed by Cloudflare."
  }
  </script>
</head>
<body>
  <div class="diagram-page">
    <!-- Header -->
    <header class="diagram-header">
      <a class="back-link" href="/">&larr; All Use Cases</a>
      <span class="uc-badge">UC 6</span>
      <h1>Secure AI Code Execution</h1>
    </header>

    <!-- Flow archetypes -->
    <div class="flow-archetype-labels">
      <div class="archetype-label">
        <span class="archetype-arrow both-flows"></span>
        Agent &rarr; Sandbox (code generation to execution)
      </div>
      <div class="archetype-label">
        <span class="archetype-arrow agent-resource"></span>
        Response path (result &rarr; agent)
      </div>
    </div>

    <!-- Main content -->
    <div class="diagram-content">
      <!-- Canvas -->
      <div class="diagram-canvas">
        <div class="flow-container">
          <svg class="flow-edges"></svg>
          <div class="flow-columns">
            <div class="flow-column col-left">
              <div class="column-label">Code Source</div>
            </div>
            <div class="flow-column col-center">
              <div class="column-label">Cloudflare Execution</div>
            </div>
            <div class="flow-column col-right">
              <div class="column-label">Results</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Side Panel -->
      <aside class="diagram-panel">
        <div class="panel-controls">
          <button class="btn btn-primary" data-action="play">Play</button>
          <button class="btn btn-secondary" data-action="prev" disabled>&larr;</button>
          <button class="btn btn-secondary" data-action="next">&rarr;</button>
          <button class="btn btn-secondary" data-action="reset">Reset</button>
          <span class="step-counter">0 / 7</span>
        </div>
        <div class="panel-step-info">
          <div class="step-info-placeholder">
            <span class="placeholder-icon">&#9654;</span>
            <p>Press <strong>Play</strong> or use the <strong>arrow keys</strong> to step through the request flow.</p>
            <p style="font-size: 0.8125rem; margin-top: 0.5rem; color: var(--text-muted);">Tap any node for details.</p>
          </div>
        </div>
      </aside>
    </div>

    <!-- Legend -->
    <footer class="diagram-legend" id="legend"></footer>
  </div>

  <script type="module">
    import { FlowEngine } from '/components/flow-engine.js';
    import { Tooltip } from '/components/tooltip.js';
    import { Legend } from '/components/legend.js';
    import { uc6 } from '/data/uc6-steps.js';

    const tooltip = new Tooltip();
    const legend = new Legend(document.getElementById('legend'));

    const engine = new FlowEngine({
      steps: uc6.steps,
      nodes: uc6.nodes,
      edges: uc6.edges,
    });

    engine.mount(
      document.querySelector('.diagram-canvas'),
      document.querySelector('.diagram-panel')
    );
  </script>
</body>
</html>
