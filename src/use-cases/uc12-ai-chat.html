<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Persistent AI Chat Agent - Cloudflare AI (Unofficial)</title>
  <meta name="description" content="Unofficial educational demo: interactive flow diagram of building a persistent AI chat agent with Cloudflare AIChatAgent, SQLite state, resumable streams, and human-in-the-loop tools. Not affiliated with or endorsed by Cloudflare.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0d1117">
  <meta name="color-scheme" content="dark">
  <link rel="canonical" href="https://ai-security.automatic-demo.com/use-cases/uc12-ai-chat.html">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://ai-security.automatic-demo.com/use-cases/uc12-ai-chat.html">
  <meta property="og:title" content="Persistent AI Chat Agent - Cloudflare AI (Unofficial)">
  <meta property="og:description" content="Unofficial educational demo: interactive flow diagram of building a persistent AI chat agent with Cloudflare AIChatAgent, SQLite state, resumable streams, and human-in-the-loop tools.">
  <meta property="og:image" content="https://ai-security.automatic-demo.com/og-image.png">
  <meta property="og:site_name" content="Cloudflare AI Security (Unofficial Demo)">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="/styles/theme.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/diagram.css">
</head>
<body>
  <div class="diagram-page">
    <header class="diagram-header">
      <a class="back-link" href="/ai-builder.html">&larr; AI Builder</a>
      <span class="uc-badge">UC 12</span>
      <h1>Persistent AI Chat Agent</h1>
    </header>

    <div class="flow-archetype-labels">
      <div class="archetype-label">
        <span class="archetype-arrow human-ai"></span>
        Browser Client &rarr; AIChatAgent &rarr; LLM + Tools &rarr; Streaming response
      </div>
    </div>

    <div class="diagram-content">
      <div class="diagram-canvas">
        <div class="flow-container">
          <svg class="flow-edges"></svg>
          <div class="flow-columns">
            <div class="flow-column col-left">
              <div class="column-label">Browser Client</div>
            </div>
            <div class="flow-column col-center">
              <div class="column-label">AIChatAgent Pipeline</div>
            </div>
            <div class="flow-column col-right">
              <div class="column-label">Tools &amp; LLM Providers</div>
            </div>
          </div>
        </div>
      </div>

      <aside class="diagram-panel">
        <div class="panel-controls">
          <button class="btn btn-primary" data-action="play">Play</button>
          <button class="btn btn-secondary" data-action="prev" disabled>&larr;</button>
          <button class="btn btn-secondary" data-action="next">&rarr;</button>
          <button class="btn btn-secondary" data-action="reset">Reset</button>
          <span class="step-counter">0 / 7</span>
        </div>
        <div class="panel-step-info">
          <div class="step-info-placeholder">
            <span class="placeholder-icon">&#9654;</span>
            <p>Press <strong>Play</strong> or use the <strong>arrow keys</strong> to step through the request flow.</p>
            <p style="font-size: 0.8125rem; margin-top: 0.5rem; color: var(--text-muted);">Tap any node for details.</p>
          </div>
        </div>
      </aside>
    </div>

    <footer class="diagram-legend" id="legend"></footer>
  </div>

  <script type="module">
    import { FlowEngine } from '/components/flow-engine.js';
    import { Tooltip } from '/components/tooltip.js';
    import { Legend } from '/components/legend.js';
    import { uc12 } from '/data/uc12-steps.js';

    const tooltip = new Tooltip();
    const legend = new Legend(document.getElementById('legend'));

    const engine = new FlowEngine({
      steps: uc12.steps,
      nodes: uc12.nodes,
      edges: uc12.edges,
    });

    engine.mount(
      document.querySelector('.diagram-canvas'),
      document.querySelector('.diagram-panel')
    );
  </script>
</body>
</html>
