      {"@type": "HowToStep", "name": "A/B Percentage Split", "text": "Probabilistic traffic split for safe model migrations and testing"},

<body>
  <div class="diagram-page">
    <!-- Header -->
    <header class="diagram-header">
      <a class="back-link" href="/ai-builder.html">&larr; AI Builder</a>
      <span class="uc-badge">UC 9</span>
      <h1>Dynamic Routing</h1>
    </header>

    <!-- Flow archetypes -->
    <div class="flow-archetype-labels">
      <div class="archetype-label">
        <span class="archetype-arrow both-flows"></span>
        App / Admin &rarr; AI Gateway &rarr; AI Provider
      </div>
      <div class="archetype-label">
        <span class="archetype-arrow agent-resource"></span>
        Provider &rarr; App (response path)
      </div>
    </div>

    <!-- Main content -->
    <div class="diagram-content">
      <!-- Canvas -->
      <div class="diagram-canvas">
        <div class="flow-container">
          <svg class="flow-edges"></svg>
          <div class="flow-columns">
            <div class="flow-column col-left">
              <div class="column-label">App / Admin</div>
            </div>
            <div class="flow-column col-center">
              <div class="column-label">Dynamic Routing Pipeline</div>
            </div>
            <div class="flow-column col-right">
              <div class="column-label">LLM Providers</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Side Panel -->
      <aside class="diagram-panel">
        <div class="panel-controls">
          <button class="btn btn-primary" data-action="play">Play</button>
          <button class="btn btn-secondary" data-action="prev" disabled>&larr;</button>
          <button class="btn btn-secondary" data-action="next">&rarr;</button>
          <button class="btn btn-secondary" data-action="reset">Reset</button>
          <span class="step-counter">0 / 9</span>
        </div>
        <div class="panel-step-info">
          <div class="step-info-placeholder">
            <span class="placeholder-icon">&#9654;</span>
            <p>Press <strong>Play</strong> or use the <strong>arrow keys</strong> to step through the request flow.</p>
            <p style="font-size: 0.8125rem; margin-top: 0.5rem; color: var(--text-muted);">Tap any node for details.</p>
          </div>
        </div>
      </aside>
    </div>

    <!-- Legend -->
    <footer class="diagram-legend" id="legend"></footer>
  </div>

  <script type="module">
    import { FlowEngine } from '/components/flow-engine.js';
    import { Tooltip } from '/components/tooltip.js';
    import { Legend } from '/components/legend.js';
    import { uc9 } from '/data/uc9-steps.js';

    const tooltip = new Tooltip();
    const legend = new Legend(document.getElementById('legend'));

    const engine = new FlowEngine({
      steps: uc9.steps,
      nodes: uc9.nodes,
      edges: uc9.edges,
    });

    engine.mount(
      document.querySelector('.diagram-canvas'),
      document.querySelector('.diagram-panel')
    );
  </script>
